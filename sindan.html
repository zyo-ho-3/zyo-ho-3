<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診断サイト</title>
    <link rel="stylesheet" href="style_sindan.css">
</head>
<body>
    <h1>あなたのタイプ診断</h1>
    <form id="quizForm">
        <div>
            <label>質問1: 捨て猫がいます。どうしますか？</label><br>
            <input type="radio" name="question1" value="A"> 持って帰る<br>
            <input type="radio" name="question1" value="B"> 踊る<br>
            <input type="radio" name="question1" value="C"> 無視<br>
        </div>
        <div>
            <label>質問2: カラオケに来ました。どうしますか？</label><br>
            <input type="radio" name="question2" value="D"> 歌う<br>
            <input type="radio" name="question2" value="E"> 踊る<br>
            <input type="radio" name="question2" value="F"> 帰る<br>
        </div>
        <button type="submit">診断する</button>
    </form>
    <div id="result_a"></div>

    <div id="result_b"></div>

    <div id="result_c"></div>

    <script src="script_sindan.js"></script>
</body>
</html>
